server:
  port: 8084
  servlet:
    context-path: /

spring:
  application:
    name: im-service

  datasource:
    url: jdbc:mysql://localhost:3306/heartmatch_im?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.heartmatch: DEBUG
