server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**,/api/v1/auth/**
          filters:
            - StripPrefix=0

        - id: content-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/posts/**,/api/v1/topics/**,/api/v1/stories/**
          filters:
            - StripPrefix=0

        - id: match-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/matches/**,/api/v1/swipe/**
          filters:
            - StripPrefix=0

        - id: im-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/conversations/**,/api/v1/messages/**
          filters:
            - StripPrefix=0

        - id: video-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/reels/**,/api/v1/musics/**
          filters:
            - StripPrefix=0

        - id: live-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/lives/**
          filters:
            - StripPrefix=0

        - id: pay-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/vip/**,/api/v1/wallet/**,/api/v1/gifts/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true

  redis:
    host: localhost
    port: 6379

jwt:
  secret: ${JWT_SECRET:heartmatch-secret-key-2024}
  expiration: 86400000

logging:
  level:
    org.springframework.cloud.gateway: DEBUG