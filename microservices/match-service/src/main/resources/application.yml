server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: match-service

  datasource:
    url: jdbc:mysql://localhost:3306/heartmatch_match?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: heartmatch-secret-key-2024
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.heartmatch: DEBUG
